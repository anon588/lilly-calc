<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffd9ec">
<title>♡ Lilly's Calculator ♡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ease:cubic-bezier(.34,1.56,.64,1);
    --ease2:cubic-bezier(.45,.05,.25,1);
    --pink:#ff8fc7; --pink-d:#ff5fae; --pink-dd:#ff3d9a;
    --lav:#c9b8ff; --mint:#b6f0e0; --sky:#bfe4ff;
    --text:#7a2a5c; --text-d:#5e1c47;
    --ink:#ff4f9e;
    --card:rgba(255,255,255,.72);
    --stroke:rgba(255,143,199,.45);
    --num:linear-gradient(160deg,#ffffff,#fff0f8);
    --shadow:0 26px 60px rgba(255,77,158,.30), 0 6px 18px rgba(255,143,199,.25);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;height:100dvh;overflow:hidden;}
  body{
    font-family:"Quicksand","Poppins",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    color:var(--text);
    display:flex;align-items:center;justify-content:center;
    background:
      radial-gradient(120% 100% at 12% 8%, #fff2f9 0%, #ffe1f1 38%, #ffd0ea 70%, #ffc2e6 100%);
    position:relative; padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    user-select:none;-webkit-user-select:none;touch-action:manipulation;
  }
  .orb{position:fixed;border-radius:50%;filter:blur(46px);opacity:.55;pointer-events:none;animation:drift 16s ease-in-out infinite;z-index:0;}
  .orb.a{width:46vmin;height:46vmin;left:-10vmin;top:-8vmin;background:radial-gradient(circle,#ff9ad6,transparent 70%);}
  .orb.b{width:40vmin;height:40vmin;right:-12vmin;bottom:-10vmin;background:radial-gradient(circle,#c3b0ff,transparent 70%);animation-delay:-5s;}
  .orb.c{width:32vmin;height:32vmin;right:16vmin;top:8vmin;background:radial-gradient(circle,#9fe6ff,transparent 70%);animation-delay:-10s;}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(3vmin,4vmin) scale(1.08)}66%{transform:translate(-3vmin,2vmin) scale(.95)}}

  .stage{perspective:1200px;z-index:2;animation:rise 1s var(--ease2) both;}
  @keyframes rise{from{opacity:0;transform:translateY(26px) scale(.96)}to{opacity:1;transform:none}}

  .calc{
    width:min(92vw,360px);
    border-radius:34px;
    padding:20px 18px 22px;
    background:linear-gradient(165deg,rgba(255,255,255,.85),rgba(255,240,250,.6));
    border:1px solid var(--stroke);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.9);
    backdrop-filter:blur(20px) saturate(1.25);
    -webkit-backdrop-filter:blur(20px) saturate(1.25);
    transform-style:preserve-3d;
    transition:transform .5s var(--ease2);
    will-change:transform;
  }

  .head{display:flex;flex-direction:column;align-items:center;margin-bottom:12px;position:relative;}
  .bow{font-size:46px;line-height:1;filter:drop-shadow(0 6px 12px rgba(255,77,158,.4));animation:bob 3.2s ease-in-out infinite;transform-origin:50% 60%;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-5px) rotate(3deg)}}
  .title{margin-top:2px;font-size:17px;font-weight:700;letter-spacing:.6px;color:var(--text-d);}
  .title b{color:var(--ink);}
  .mute{position:absolute;right:-2px;top:-4px;width:34px;height:34px;border-radius:50%;border:1px solid var(--stroke);
    background:rgba(255,255,255,.7);color:var(--text);font-size:15px;cursor:pointer;display:grid;place-items:center;
    transition:transform .15s var(--ease),background .2s;}
  .mute:active{transform:scale(.9);}

  .display{
    background:linear-gradient(180deg,#fffdfe,#fff4fa);
    border:1px solid rgba(255,143,199,.4);
    border-radius:22px;
    padding:16px 18px 18px;
    margin-bottom:16px;
    text-align:right;
    overflow:hidden;
    box-shadow:inset 0 3px 14px rgba(255,143,199,.18);
  }
  .expr{font-size:14px;min-height:18px;color:#c98bb6;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;transition:opacity .2s;}
  .result{font-size:clamp(30px,9.5vw,44px);font-weight:700;line-height:1.1;margin-top:4px;color:var(--text-d);
    font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .result.bump{animation:bump .28s var(--ease);}
  @keyframes bump{0%{transform:scale(1)}45%{transform:scale(1.06)}100%{transform:scale(1)}}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;}
  .btn{
    appearance:none;border:1px solid rgba(255,143,199,.4);
    background:var(--num);
    color:var(--text-d);
    font-family:inherit;font-size:22px;font-weight:700;
    height:60px;border-radius:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:transform .14s var(--ease),box-shadow .2s,background .25s;
    box-shadow:0 4px 0 rgba(255,143,199,.30), 0 8px 16px rgba(255,143,199,.18);
    font-variant-numeric:tabular-nums;position:relative;overflow:hidden;
  }
  .btn:active{transform:translateY(3px) scale(.96);box-shadow:0 1px 0 rgba(255,143,199,.30),0 3px 8px rgba(255,143,199,.18);}
  .btn .ripple{position:absolute;border-radius:50%;background:rgba(255,77,158,.35);transform:scale(0);animation:rip .5s var(--ease2) forwards;pointer-events:none;}
  @keyframes rip{to{transform:scale(2.6);opacity:0;}}
  .btn.op{color:#fff;background:linear-gradient(160deg,var(--pink),var(--pink-d));border-color:transparent;
    box-shadow:0 4px 0 var(--pink-dd),0 8px 16px rgba(255,61,154,.35);text-shadow:0 1px 2px rgba(255,61,154,.4);}
  .btn.eq{color:#fff;background:linear-gradient(160deg,#ff7ac0,var(--pink-dd));border-color:transparent;font-weight:800;
    box-shadow:0 5px 0 #e01f7e,0 10px 22px rgba(255,61,154,.45);text-shadow:0 1px 3px rgba(224,31,126,.5);}
  .btn.fn{color:var(--pink-dd);background:linear-gradient(160deg,#fff,#ffe9f5);}
  .btn.zero{grid-column:span 2;}

  .foot{margin-top:13px;text-align:center;font-size:11px;color:#d98bc0;letter-spacing:.5px;font-weight:600;}

  .toast{position:fixed;left:50%;bottom:9%;transform:translateX(-50%) translateY(20px);
    background:rgba(255,255,255,.92);border:1px solid var(--stroke);color:var(--text-d);
    padding:10px 18px;border-radius:16px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;
    transition:opacity .3s var(--ease),transform .3s var(--ease);z-index:6;box-shadow:var(--shadow);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .spark{position:fixed;z-index:7;pointer-events:none;font-size:20px;animation:spark 0.9s var(--ease) forwards;}
  @keyframes spark{0%{opacity:0;transform:translate(0,0) scale(.4) rotate(0);}20%{opacity:1;}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.1) rotate(var(--rot));}}

  @media (prefers-reduced-motion: reduce){
    .orb,.bow{animation:none;}
  }
</style>
</head>
<body>
  <div class="orb a"></div><div class="orb b"></div><div class="orb c"></div>

  <div class="stage">
    <div class="calc" id="calc">
      <div class="head">
        <div class="bow" aria-hidden="true">🎀</div>
        <div class="title">for <b>Lilly</b> ♡</div>
        <button class="mute" id="mute" aria-label="sound toggle">🔊</button>
      </div>

      <div class="display">
        <div class="expr" id="expr"></div>
        <div class="result" id="result">0</div>
      </div>

      <div class="grid" id="grid">
        <button class="btn fn" data-act="clear">AC</button>
        <button class="btn fn" data-act="neg">+/−</button>
        <button class="btn fn" data-act="pct">%</button>
        <button class="btn op" data-op="÷">÷</button>

        <button class="btn num" data-num="7">7</button>
        <button class="btn num" data-num="8">8</button>
        <button class="btn num" data-num="9">9</button>
        <button class="btn op" data-op="×">×</button>

        <button class="btn num" data-num="4">4</button>
        <button class="btn num" data-num="5">5</button>
        <button class="btn num" data-num="6">6</button>
        <button class="btn op" data-op="−">−</button>

        <button class="btn num" data-num="1">1</button>
        <button class="btn num" data-num="2">2</button>
        <button class="btn num" data-num="3">3</button>
        <button class="btn op" data-op="+">+</button>

        <button class="btn num zero" data-num="0">0</button>
        <button class="btn num" data-dot=".">.</button>
        <button class="btn eq" data-act="equals">=</button>
      </div>

      <div class="foot">made with love · tap or type ♡</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  var exprEl=document.getElementById('expr');
  var resultEl=document.getElementById('result');
  var toastEl=document.getElementById('toast');
  var muteBtn=document.getElementById('mute');
  var calc=document.getElementById('calc');

  var current="0", expr="", justEvaluated=false, lastOp=null, muted=false;

  // ---- sound ----
  var actx=null;
  function audio(){ if(muted) return null; try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==='suspended') actx.resume(); return actx; }catch(e){ return null; } }
  function blip(freq,dur,type,vol){
    var a=audio(); if(!a) return;
    var o=a.createOscillator(), g=a.createGain(), t=a.currentTime;
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.18,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.12));
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+(dur||0.12)+0.02);
  }
  function soundTap(){ blip(720,0.09,'triangle',0.14); }
  function soundOp(){ blip(520,0.10,'sine',0.14); }
  function soundEq(){ [660,880,1175].forEach(function(f,i){ setTimeout(function(){blip(f,0.16,'triangle',0.16);},i*70); }); }

  // ---- display ----
  function fmt(n){
    if(!isFinite(n)) return "∞";
    var r=Math.round(n*1e10)/1e10;
    var s=String(r);
    if(s.indexOf('e')>-1||s.indexOf('E')>-1) return s;
    return s;
  }
  function render(){ resultEl.textContent=current; exprEl.textContent=expr; }
  function bump(){ resultEl.classList.remove('bump'); void resultEl.offsetWidth; resultEl.classList.add('bump'); }
  var toastT;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){toastEl.classList.remove('show');},1500); }

  // ---- logic ----
  function inputNum(d){
    if(justEvaluated){ current="0"; expr=""; justEvaluated=false; }
    if(current==="0"&&d!==".") current=d;
    else if(d==="."&&current.indexOf('.')>-1) return;
    else current+=d;
    render(); bump(); soundTap();
  }
  function inputDot(){
    if(justEvaluated){ current="0"; expr=""; justEvaluated=false; }
    if(current.indexOf('.')===-1) current+=".";
    render(); bump(); soundTap();
  }
  function applyOp(op){
    if(justEvaluated){ expr=current+" "; justEvaluated=false; }
    else if(expr===""){ expr=current+" "; }
    else if(lastOp!==null){ evaluate(false); expr=current+" "; }
    expr+=op+" "; lastOp=op; current="0"; render(); soundOp();
  }
  function neg(){ current=fmt(parseFloat(current)*-1); render(); bump(); soundTap(); }
  function pct(){
    var base = expr==="" ? 0 : parseFloat(expr);
    current=fmt(parseFloat(current)/100 * (base||1));
    render(); bump(); soundTap();
  }
  function clearAll(){ current="0"; expr=""; lastOp=null; justEvaluated=false; render(); soundTap(); }
  function backspace(){
    if(justEvaluated){ clearAll(); return; }
    if(current.length>1) current=current.slice(0,-1); else current="0";
    render();
  }
  var OPS={'+':function(a,b){return a+b;},'−':function(a,b){return a-b;},'×':function(a,b){return a*b;},'÷':function(a,b){return b===0?NaN:a/b;}};
  function evaluate(final){
    try{
      var parts=expr.trim().split(/\s+/);
      if(parts.length<3){ if(final){ justEvaluated=true; } if(final) soundEq(); return; }
      var acc=parseFloat(parts[0]);
      for(var i=1;i<parts.length;i+=2){
        var op=parts[i], val=parseFloat(parts[i+1]);
        if(OPS[op]===undefined) break;
        acc=OPS[op](acc,val);
      }
      if(!isFinite(acc)) toast("silly 💕 can't divide by zero");
      current=fmt(acc);
      if(final){ expr=""; lastOp=null; justEvaluated=true; sparkle(); }
      else { expr=current+" "; }
      render(); bump(); if(final) soundEq();
    }catch(e){ current="∞"; render(); }
  }

  // ---- sparkles ----
  var GLYPH=["💖","✨","🌸","💕","⭐","🎀"];
  function sparkle(){
    var r=calc.getBoundingClientRect();
    var cx=r.left+r.width/2, cy=r.top+r.height*0.62;
    for(var i=0;i<14;i++){
      var s=document.createElement('div');
      s.className='spark'; s.textContent=GLYPH[Math.floor(Math.random()*GLYPH.length)];
      s.style.left=(cx+(Math.random()*40-20))+'px';
      s.style.top=(cy+(Math.random()*20-10))+'px';
      var ang=Math.random()*Math.PI*2, dist=60+Math.random()*90;
      s.style.setProperty('--dx',(Math.cos(ang)*dist).toFixed(0)+'px');
      s.style.setProperty('--dy',(Math.sin(ang)*dist-50).toFixed(0)+'px');
      s.style.setProperty('--rot',(Math.random()*360-180).toFixed(0)+'deg');
      s.style.fontSize=(14+Math.random()*14)+'px';
      document.body.appendChild(s);
      (function(el){ setTimeout(function(){ el.remove(); },950); })(s);
    }
  }

  // ---- ripple ----
  function ripple(btn,e){
    var r=btn.getBoundingClientRect();
    var x=(e&&e.clientX?e.clientX:r.left+r.width/2)-r.left;
    var y=(e&&e.clientY?e.clientY:r.top+r.height/2)-r.top;
    var d=document.createElement('span'); d.className='ripple';
    var size=Math.max(r.width,r.height);
    d.style.width=d.style.height=size+'px';
    d.style.left=(x-size/2)+'px'; d.style.top=(y-size/2)+'px';
    btn.appendChild(d); setTimeout(function(){ d.remove(); },520);
  }

  // ---- tilt ----
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!reduce){
    window.addEventListener('pointermove',function(e){
      var r=calc.getBoundingClientRect();
      var px=(e.clientX-(r.left+r.width/2))/(r.width/2);
      var py=(e.clientY-(r.top+r.height/2))/(r.height/2);
      px=Math.max(-1,Math.min(1,px)); py=Math.max(-1,Math.min(1,py));
      calc.style.transform='rotateY('+(px*5).toFixed(2)+'deg) rotateX('+(-py*5).toFixed(2)+'deg)';
    });
    window.addEventListener('pointerleave',function(){ calc.style.transform=''; });
  }

  // ---- events ----
  document.getElementById('grid').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b) return;
    ripple(b,e);
    if(b.dataset.num!==undefined) inputNum(b.dataset.num);
    else if(b.dataset.dot!==undefined) inputDot();
    else if(b.dataset.op!==undefined) applyOp(b.dataset.op);
    else if(b.dataset.act==="equals") evaluate(true);
    else if(b.dataset.act==="clear") clearAll();
    else if(b.dataset.act==="neg") neg();
    else if(b.dataset.act==="pct") pct();
  });
  document.addEventListener('keydown',function(e){
    var k=e.key;
    if(k>='0'&&k<='9'){ soundTap(); inputNum(k); }
    else if(k==='.'){ soundTap(); inputDot(); }
    else if(k==='+'){ soundOp(); applyOp('+'); }
    else if(k==='-'){ soundOp(); applyOp('−'); }
    else if(k==='*'){ soundOp(); applyOp('×'); }
    else if(k==='/'){ e.preventDefault(); soundOp(); applyOp('÷'); }
    else if(k==='Enter'||k==='='){ e.preventDefault(); evaluate(true); }
    else if(k==='Backspace'){ e.preventDefault(); backspace(); }
    else if(k==='Escape'){ soundTap(); clearAll(); }
    else if(k==='%'){ soundTap(); pct(); }
  });
  muteBtn.addEventListener('click',function(){
    muted=!muted; muteBtn.textContent=muted?'🔇':'🔊';
    if(!muted) soundTap();
  });

  render();
})();
</script>
</body>
</html>
